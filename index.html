<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin DashBoard</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="grid-container">
            <div id="header">
                <div id="search-bar">
                    <img src="icons/magnify.svg" width="20px" height="20px">
                    <input type="text" id="search-input">
                </div>
                <div id="profile-section">
                    <img src="icons/bell-ring.svg" width="20px" height="20px">
                    <img src="avatar.webp" width="33px" height="33px" style="border-radius: 50%;">
                    <span>Daniel Nguyen</span>
                </div>
                <div id="greeting-section">
                    <img src="avatar.webp" width="50px" height="50px" style="border-radius: 50%;">
                    <div id="text">
                        <p>Hi there,</p>
                        <p>Daniel Nguyen (@daniel)</p>
                    </div>
                </div>
                <div id="buttons-section">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
            <div id="sidebar">
                <div id="logo-row">
                    <img src="icons/view-dashboard.svg" width="35px" height="35px">
                    <span style="padding-top: 6px; font-size: 20px; color: white;">Dashboard</span>
                </div>   
                <div id="nav-items">
                    <div>
                        <img src="icons/home.svg" width="16px" height="16px">
                        <span>Home</span>
                    </div>
                    <div>
                        <img src="icons/profile-icon.svg" width="16px" height="16px">
                        <span>Profile</span>
                    </div>
                    <div>
                        <img src="icons/message-icon.svg" width="16px" height="16px">
                        <span>Messages</span>
                    </div>
                    <div>
                        <img src="icons/history.svg" width="16px" height="16px">
                        <span>History</span>
                    </div>  
                    <div>
                        <img src="icons/tasks-icon.svg" width="16px" height="16px">
                        <span>Tasks</span>
                    </div>  
                    <div>
                        <img src="icons/communty-icon.svg" width="16px" height="16px">
                        <span>Communities</span>
                    </div>                   
                </div>  
                <div id="bottom-nav">
                    <div>
                        <img src="icons/setting-icon.svg" width="16px" height="16px">
                        <span>Settings</span>
                    </div>  
                    <div>
                        <img src="icons/support-icon.svg" width="16px" height="16px">
                        <span>Support</span>
                    </div>  
                    <div>
                        <img src="icons/privacy-icon.svg" width="16px" height="16px">
                        <span>Privacy</span>
                    </div>  
                </div>
            </div>
            <div id="main-content"></div>
        </div>
    </body>
</html>
