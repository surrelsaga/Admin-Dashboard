<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Admin DashBoard</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="grid-container">
            <div id="header">
                <div id="search-bar">
                    <img src="icons/magnify.svg" width="20px" height="20px">
                    <input type="text" id="search-input">
                </div>
                <div id="profile-section">
                    <img src="icons/bell-ring.svg" width="20px" height="20px">
                    <img src="avatar.webp" width="33px" height="33px" style="border-radius: 50%;">
                    <span>Daniel Nguyen</span>
                </div>
                <div id="greeting-section">
                    <img src="avatar.webp" width="50px" height="50px" style="border-radius: 50%;">
                    <div id="text">
                        <p>Hi there,</p>
                        <p>Daniel Nguyen (@daniel)</p>
                    </div>
                </div>
                <div id="buttons-section">
                    <button>New</button>
                    <button>Upload</button>
                    <button>Share</button>
                </div>
            </div>
            <div id="sidebar">
                <div id="logo-row"></div>   
                <div id="nav-items"></div>  
                <div id="bottom-nav"></div>
            </div>
            <div id="main-content"></div>
        </div>
    </body>
</html>
